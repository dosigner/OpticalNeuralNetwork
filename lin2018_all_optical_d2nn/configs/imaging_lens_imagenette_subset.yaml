  dtype: complex64

data:
  dataset: image_folder
  root: data/imagenette_subset
  object_size: 120
  batch_size: 8
  num_workers: 0

training:
  epochs: 3
  lr: 0.001
  max_steps_per_epoch: 15

viz:
  phase_display_max: 6.283185307179586

runtime:
  seed: 1234
  deterministic: true
  device: auto
  runs_dir: runs

error_model:
  max_misalignment_m: 0.0001
  absorption_alpha: 0.0
  height_quantization_levels: null

export:
  delta_n: 0.7227
  quantization_levels: null
  lumerical:
    enabled: true
    mock_mode: true
    temp_dir: runs/lumerical
    base_fsp: base.fsp
    out_fsp: final.fsp
    material_name: VeroBlackPlus_RGD875
    refractive_index: 1.7227
