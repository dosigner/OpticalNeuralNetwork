experiment:
  name: "fig3_saliency_cifar_train_video_test"
  seed: 42
  device: "cuda"
  dtype: "float32"
  deterministic: false
  save_dir: "runs"

optics:
  wavelength_m: 5.32e-7
  n: 1.0
  grid:
    nx: 160
    ny: 160
    dx_m: 2.0e-6
    dy_m: 2.0e-6
  dual_2f:
    enabled: true
    f1_m: 2.0e-3
    f2_m: 2.0e-3
    na1: 0.112
    na2: 0.112
    apply_scaling: false
  propagation:
    method: "ASM"
    layer_spacing_m: 1.0e-4
    bandlimit: true
    evanescent: "mask"

model:
  type: "fd2nn"
  num_layers: 5
  modulation:
    kind: "phase_only"
    phase_constraint: "sigmoid"
    phase_max_rad: 6.283185307179586
    init: "uniform"
    init_scale: 0.1
  nonlinearity:
    type: "sbn60"
    enabled: true
    position: "rear"
    phi_max_rad: 3.141592653589793
    intensity_norm: "background_perturbation"
    eps: 1.0e-12

task:
  name: "saliency"
  gamma_flip: true

data:
  dataset: "cifar10"
  root: "data/cifar10/"
  train_class: "cat"
  test_sets:
    - {type: "cifar10", class: "horse"}
    - {type: "video_frames", root: "data/online_horse_video_frames/"}
  preprocess:
    grayscale: true
    normalize: "minmax_0_1"
    resize_to: [100, 100]
    resize_mode: "bilinear"
    pad_to: [160, 160]
    pad_mode: "constant"
    pad_value: 0.0
    pad_align: "center"

training:
  optimizer: "adam"
  lr: 0.01
  batch_size: 512
  num_workers: 8
  pin_memory: true
  prefetch_factor: 4
  persistent_workers: true
  epochs: 100
  compute_train_fmax: false
  eval_interval_epochs: 5
  loss: "mse"

eval:
  pr_thresholds: 256
  f_beta2: 0.3
  report_f1_also: true

viz:
  enabled: true
  dpi: 300
  export_formats: ["png"]
  layout_id: "fig3"
  intensity_viz_norm: "percentile"
  intensity_percentile: [1, 99]
  phase_cmap: "twilight"
  scalebar:
    enabled: true
    row_um: {0: 80, 1: 80, 2: 80, 3: 80}
  fig3_frames:
    frame_indices: [0, 60, 120, 180, 239]
