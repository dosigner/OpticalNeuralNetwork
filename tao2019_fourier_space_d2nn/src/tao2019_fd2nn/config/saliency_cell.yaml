experiment:
  name: "fig2_saliency_cell_unitmag"
  seed: 42
  device: "cuda"
  dtype: "float32"
  deterministic: false
  save_dir: "runs"

optics:
  wavelength_m: 5.32e-7
  n: 1.0
  grid:
    nx: 800
    ny: 800
    dx_m: 2.0e-6
    dy_m: 2.0e-6
  dual_2f:
    enabled: true
    f1_m: 1.0e-2
    f2_m: 1.0e-2
    na1: 0.112
    na2: 0.112
    apply_scaling: false
  propagation:
    method: "ASM"
    layer_spacing_m: 1.0e-4
    bandlimit: true
    evanescent: "mask"

model:
  type: "fd2nn"
  num_layers: 5
  modulation:
    kind: "phase_only"
    phase_constraint: "sigmoid"
    phase_max_rad: 6.283185307179586
    init: "uniform"
    init_scale: 0.1
  nonlinearity:
    type: "sbn60"
    enabled: true
    position: "rear"
    phi_max_rad: 3.141592653589793
    intensity_norm: "background_perturbation"
    eps: 1.0e-12

task:
  name: "saliency"
  gamma_flip: true

data:
  dataset: "cell_gdc"
  root: "data/cell_gdc/"
  cell_types:
    train: ["type1"]
    val: ["type1"]
    test: ["type1", "type2", "type3"]
  split:
    train: 2750
    val: 250
    test_type1: 500
    test_type2: 250
    test_type3: 250
  patch:
    raw_patch_px: [200, 200]
  preprocess:
    grayscale: true
    normalize: "minmax_0_1"
    upsample_factor: 2
    resize_mode: "bilinear"
    pad_to: [800, 800]
    pad_mode: "constant"
    pad_value: 0.0
    pad_align: "center"

training:
  optimizer: "adam"
  lr: 0.01
  batch_size: 24
  num_workers: 8
  pin_memory: true
  prefetch_factor: 4
  persistent_workers: true
  epochs: 100
  compute_train_fmax: false
  eval_interval_epochs: 5
  loss: "mse"

eval:
  pr_thresholds: 256
  f_beta2: 0.3
  report_f1_also: true

viz:
  enabled: true
  dpi: 300
  export_formats: ["png"]
  layout_id: "fig2"
  intensity_viz_norm: "percentile"
  intensity_percentile: [1, 99]
  phase_cmap: "twilight"
  scalebar:
    enabled: true
    row_um: {0: 200, 1: 200, 2: 200, 3: 400}
  fig2_samples:
    type1_indices: [0]
    type2_indices: [0, 1]
    type3_indices: [0, 1]
