experiment:
  name: "pilot_gt_raw_s100_e15"
  seed: 42
  device: "cuda"
  dtype: "float32"
  deterministic: false
  save_dir: "reports/tuning_runs"

optics:
  wavelength_m: 5.32e-7
  n: 1.0
  grid:
    nx: 160
    ny: 160
    dx_m: 2.0e-6
    dy_m: 2.0e-6
  dual_2f:
    enabled: true
    f1_m: 2.0e-3
    f2_m: 2.0e-3
    na1: 0.112
    na2: 0.112
    apply_scaling: false
  propagation:
    method: "ASM"
    layer_spacing_m: 1.0e-4
    bandlimit: true
    evanescent: "mask"

model:
  type: "fd2nn"
  num_layers: 5
  modulation:
    kind: "phase_only"
    phase_constraint: "sigmoid"
    phase_max_rad: 6.283185307179586
    init: "uniform"
    init_scale: 0.1
  nonlinearity:
    type: "sbn60"
    enabled: true
    position: "rear"
    phi_max_rad: 3.141592653589793
    intensity_norm: "background_perturbation"
    saturation_intensity: 0.01
    learnable_saturation: true

task:
  name: "saliency"
  gamma_flip: true

data:
  dataset: "saliency_pairs"
  root: "data/cifar10_cosaliency_fu2013_variants/raw"
  preprocess:
    grayscale: true
    normalize: "minmax_0_1"
    resize_to: [100, 100]
    pad_to: [160, 160]
    resize_mode: "bilinear"

training:
  optimizer: "adam"
  lr: 0.01
  batch_size: 10
  num_workers: 0
  pin_memory: true
  prefetch_factor: 2
  persistent_workers: false
  epochs: 15
  compute_train_fmax: false
  eval_interval_epochs: 5
  loss: "mse"
  loss_normalization: "pred_and_target"
  loss_scope: "crop"

eval:
  pr_thresholds: 256
  f_beta2: 0.3
  report_f1_also: true

viz:
  enabled: true
  dpi: 300
  export_formats: ["png"]
  layout_id: "fig3"
  intensity_viz_norm: "percentile"
  intensity_percentile: [1, 99]
  phase_cmap: "twilight"
  scalebar:
    enabled: true
    row_um: {0: 80, 1: 80, 2: 80, 3: 80}
