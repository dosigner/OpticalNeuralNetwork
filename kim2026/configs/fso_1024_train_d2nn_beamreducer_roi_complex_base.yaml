experiment:
  id: fso_1024_d2nn_beamreducer_roi_complex_base
  save_dir: runs/d2nn_beamreducer_roi_complex_base

optics:
  lambda_m: 1.55e-6
  half_angle_rad: 3.0e-4
  m2: 1.0

grid:
  n: 1024
  source_window_m: 0.006578
  receiver_window_m: 0.00512

channel:
  path_length_m: 1000.0
  cn2: 1.0e-14
  outer_scale_m: 30.0
  inner_scale_m: 5.0e-3
  num_screens: 6
  frozen_flow:
    wind_speed_mps: 10.0
    wind_direction_mode: per_episode_random
    dt_s: 5.0e-4
    frames_per_episode: 1
    screen_canvas_scale: 2.0

receiver:
  aperture_diameter_m: 0.6

model:
  type: d2nn
  num_layers: 5
  layer_spacing_m: 0.05
  detector_distance_m: 0.05

training:
  epochs: 100
  batch_size: 32
  pair_generation_batch_size: 32
  eval_batch_size: 32
  learning_rate: 5.0e-4
  loss:
    mode: roi_complex
    roi_threshold: 0.5
    intensity_weight: 1.0
    phase_weight: 0.2
    leakage_weight: 0.3
    leakage_threshold: 0.15
    phase_gamma: 2.0
    weights:
      overlap: 0.0
      radius: 0.0
      encircled: 0.0

data:
  cache_dir: data/kim2026/1km_cn2e-14_w2m_n1024_dx2mm_2k/cache
  split_manifest_path: data/kim2026/1km_cn2e-14_w2m_n1024_dx2mm_2k/split_manifest.json
  episode_manifest_path: data/kim2026/1km_cn2e-14_w2m_n1024_dx2mm_2k/episodes.json
  split_episode_counts:
    train: 1600
    val: 200
    test: 200

evaluation:
  split: test
  metrics: [complex_overlap, intensity_overlap, strehl, phase_rmse_rad, out_of_support_energy_fraction, amplitude_rmse]
  save_json: true

visualization:
  save_raw: true
  save_plots: true
  output_dir: runs/d2nn_beamreducer_roi_complex_base/figures

runtime:
  seed: 20260325
  strict_reproducibility: true
  allow_tf32: false
  deterministic_algorithms: true
  cublas_workspace_config: ":4096:8"
  device: cuda
  num_workers: 0
  pin_memory: true
  persistent_workers: false
  prefetch_factor: 2
  fft_warmup_iters: 3
