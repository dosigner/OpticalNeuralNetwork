# 0403 TP weight sweep + raw received power loss
# Data: pitch_rescale (same as 0402 for fair comparison)
# 5 strategies: TP weight 0.5/1.0(baseline)/2.0/5.0 + raw RP

training:
  seed: 20260403
  lr: 8.0e-3
  epochs: 30
  batch_size: 32
  tv_weight: 0.05
  warmup_epochs: 5

architecture:
  num_layers: 5
  layer_spacing_m: 0.01
  detector_distance_m: 0.01
  propagation_pad_factor: 2

physics:
  wavelength_m: 1.55e-6
  receiver_window_m: 0.002048
  aperture_diameter_m: 0.002
  focus_f_m: 4.5e-3
  pib_bucket_radius_um: 10.0

data:
  path: data/kim2026/1km_cn2_5e-14_tel15cm_pitch_rescale
  plane_selector: stored

output:
  dir: autoresearch/runs/0403-tp-sweep-raw-rp-pitchrescale-cn2-5e14

strategies:
  - focal_tp_pib_w05
  - focal_tp_pib_w2
  - focal_tp_pib_w5
  - focal_raw_received_power
